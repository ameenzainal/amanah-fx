<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amanah Growth FX Lucky Draw</title>

<style>

/* ===== BASIC ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
url('https://thumbs.dreamstime.com/b/futuristic-financial-dashboard-featuring-glowing-bar-graphs-rising-line-chart-neon-orange-elements-contrast-dark-348684501.jpg');
background-size:cover;
background-position:center;
color:white;
}

/* ===== LOGIN POPUP ===== */
.loginPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.loginBox{
width:320px;
background:#111827;
padding:25px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,255,255,.1);
}

.loginBox input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.loginBox button{
width:100%;
margin-top:15px;
padding:10px;
background:#0ea5e9;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* ===== MAIN ===== */
.container{
max-width:1300px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.logo{
font-size:42px;
font-weight:700;
letter-spacing:2px;
margin-bottom:25px;
}

.numberBox{
width:340px;
height:140px;
margin:30px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:58px;
font-weight:bold;
border-radius:20px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(14,165,233,.25);
}

.spin{
animation:shake .08s infinite;
}

@keyframes shake{
0%{transform:translateY(0)}
50%{transform:translateY(-2px)}
100%{transform:translateY(2px)}
}

button{
padding:14px 40px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:#0ea5e9;
color:white;
transition:.3s;
}

button:hover{background:#0284c7;}

.notice{
margin-top:20px;
font-size:16px;
font-weight:600;
color:#7dd3fc;
}

.titlePrize{
margin-top:50px;
margin-bottom:20px;
font-size:28px;
font-weight:bold;
}

.prizeList{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.prizeCard{
width:230px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
overflow:hidden;
backdrop-filter:blur(10px);
}

.prizeCard img{
width:100%;
height:180px;
object-fit:contain;
padding:10px;
}

.prizeName{
padding:15px;
font-size:18px;
font-weight:600;
border-top:1px solid rgba(255,255,255,.08);
}

/* ===== POPUP RESULT ===== */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:9999;
justify-content:center;
align-items:center;
}

.popupContent{
width:90%;
max-width:450px;
background:#111827;
border-radius:20px;
padding:30px;
text-align:center;
}

.popupTitle{
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.popupPrize{
font-size:24px;
font-weight:bold;
color:#38bdf8;
margin:15px 0;
}

.closeBtn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN POPUP -->
<div id="loginPopup" class="loginPopup">
<div class="loginBox">

<h2>AMANAH GROWTH FX</h2>
<p>Login Pelabur</p>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="phone" placeholder="No Phone">

<button onclick="login()">TERUSKAN</button>

</div>
</div>

<!-- 🔐 OTP POPUP -->
<div id="otpPopup" class="loginPopup" style="display:none;">
<div class="loginBox">

<h2>VERIFICATION</h2>
<p>Kod dihantar ke Telegram</p>

<input type="text" id="otp" placeholder="Masukkan kod">

<button onclick="verifyOTP()">SAHKAN</button>

</div>
</div>

<!-- MAIN -->
<div class="container">

<div class="logo">AMANAH GROWTH FX</div>

<div id="numberBox" class="numberBox">----</div>

<button id="drawBtn" onclick="startDraw()" disabled>
Cabut Sekarang
</button>

<div id="notice" class="notice"></div>

<div class="titlePrize">Senarai Hadiah Utama</div>

<div class="prizeList">

<div class="prizeCard">
<img src="bmw.png">
<div class="prizeName">BMW X7</div>
</div>

<div class="prizeCard">
<img src="goldbar.png">
<div class="prizeName">Emas 10 Gram</div>
</div>

<div class="prizeCard">
<img src="pakejumrah.png">
<div class="prizeName">Pakej Umrah</div>
</div>

<div class="prizeCard">
<img src="wangtunai.png">
<div class="prizeName">Wang Tunai RM1000</div>
</div>

</div>

</div>

<!-- RESULT POPUP -->
<div id="popup" class="popup">
<div class="popupContent">

<div id="popupTitle" class="popupTitle"></div>
<div id="popupNumber"></div>
<div id="popupPrize" class="popupPrize"></div>
<div id="popupText"></div>

<button class="closeBtn" onclick="closePopup()">Tutup</button>

</div>
</div>

<script>

let realOTP = "778899";

/* ===== LOGIN ===== */
function login(){

let nama = document.getElementById("nama").value;
let phone = document.getElementById("phone").value;

if(nama=="" || phone==""){
alert("Isi semua maklumat");
return;
}

localStorage.setItem("user",nama);

document.getElementById("loginPopup").style.display="none";
document.getElementById("otpPopup").style.display="flex";

}

/* ===== OTP ===== */
function verifyOTP(){

let otp = document.getElementById("otp").value;

if(otp === realOTP){

document.getElementById("otpPopup").style.display="none";

document.getElementById("drawBtn").disabled=false;

document.getElementById("notice").innerHTML=
"Anda berjaya login. Sila cabut sekarang.";

}else{
alert("Kod salah!");
}

}

/* ===== DRAW LOCK ===== */
window.onload=function(){

if(localStorage.getItem("agfx_drawn")){
document.getElementById("drawBtn").style.display="none";
document.getElementById("notice").innerHTML=
"Anda sudah membuat cabutan.";
}

};

/* ===== DRAW ===== */
function startDraw(){

localStorage.setItem("agfx_drawn","yes");

document.getElementById("drawBtn").style.display="none";

let box=document.getElementById("numberBox");
box.classList.add("spin");

let count=0;

let rolling=setInterval(function(){

box.innerHTML=Math.floor(Math.random()*9000)+1000;

count++;

if(count>40){

clearInterval(rolling);

box.classList.remove("spin");

let nombor=Math.floor(Math.random()*9000)+1000;

box.innerHTML=nombor;

showResult(nombor);

}

},70);

}

/* ===== RESULT ===== */
function showResult(nombor){

const hadiahList=[
"BMW X7",
"Emas 10 Gram",
"Pakej Umrah",
"Wang Tunai RM1000",
"Maaf, Cuba Lagi","Maaf, Cuba Lagi"
];

let hadiah=hadiahList[Math.floor(Math.random()*hadiahList.length)];

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle")=
(hadiah==="Maaf, Cuba Lagi")?"TERIMA KASIH":"TAHNIAH";

document.getElementById("popupTitle").innerHTML=
(hadiah==="Maaf, Cuba Lagi")?"TERIMA KASIH":"TAHNIAH";

document.getElementById("popupPrize").innerHTML=hadiah;

document.getElementById("popupNumber").innerHTML=
"Nombor Anda: <b>"+nombor+"</b>";

document.getElementById("popupText").innerHTML=
"Sila screenshot keputusan ini.";

}

/* ===== CLOSE ===== */
function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
